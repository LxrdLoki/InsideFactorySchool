@if(posts()) {

  @for (post of posts(); track post.id) {
    <div class="postCard">
      <h2>{{ post.title }}</h2>

      <p>{{ post.text }}</p>

      <span>{{ post.subject }}</span>

      <a [routerLink]="['/forum/post', post.id]">
        View post
      </a>
    </div>
  }

} @else {
  <p>No posts found</p>
}
